<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Mask Processor</title>
    <link href="./styles.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">

        <div class="header">
            <h1>Image Mask Processor</h1>
            <p class="subtitle">Upload images or PDFs to extract segmentation masks</p>
        </div>

        <div class="body">

            <!-- Dismisses automatically after 5 seconds -->
            <div id="alert" class="alert"></div>

            <form id="uploadForm">
                <div class="form-section">
                    <label for="fileInput">Select Files</label>
                    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.pdf" multiple required>
                    <div class="help-text">Supported formats: JPG, PNG, PDF &mdash; Max 50 MB per file</div>
                    <div id="fileInfo" class="file-info"></div>
                </div>

                <div class="button-group">
                    <button type="submit" id="uploadBtn" class="btn-primary">Upload &amp; Process</button>
                    <button type="button" id="clearBtn" class="btn-secondary">Clear</button>
                </div>
            </form>

            <!-- Shown while requests are in flight -->
            <div id="progressSection" class="progress-section">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="progress-text">
                    <span class="spinner"></span>
                    <span id="progressText">Processing...</span>
                </div>
                <div id="statusText" class="status-text"></div>
            </div>

            <!-- Shown once processing is complete -->
            <div id="previewSection" class="preview-section">
                <div class="divider"></div>
                <div class="preview-header">
                    <p class="section-label">Result</p>
                    <span id="slideCounter" class="slide-counter"></span>
                </div>

                <!-- Slide arrows are hidden for single results -->
                <div class="slideshow">
                    <button id="prevBtn" class="slide-arrow" aria-label="Previous">&#8249;</button>
                    <img id="previewImage" class="preview-image" src="" alt="Processed result">
                    <button id="nextBtn" class="slide-arrow" aria-label="Next">&#8250;</button>
                </div>

                <div class="preview-actions">
                    <!-- "Download All" is hidden for single results -->
                    <button id="downloadAllBtn" class="btn-download-all">Download All</button>
                    <a id="downloadBtn" class="btn-download" download="processed.png">Download</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- DOM references ---

        const form            = document.getElementById('uploadForm');
        const fileInput       = document.getElementById('fileInput');
        const uploadBtn       = document.getElementById('uploadBtn');
        const clearBtn        = document.getElementById('clearBtn');
        const alertEl         = document.getElementById('alert');
        const progressSection = document.getElementById('progressSection');
        const progressFill    = document.getElementById('progressFill');
        const progressText    = document.getElementById('progressText');
        const statusText      = document.getElementById('statusText');
        const previewSection  = document.getElementById('previewSection');
        const previewImage    = document.getElementById('previewImage');
        const downloadBtn     = document.getElementById('downloadBtn');
        const downloadAllBtn  = document.getElementById('downloadAllBtn');
        const slideCounter    = document.getElementById('slideCounter');
        const prevBtn         = document.getElementById('prevBtn');
        const nextBtn         = document.getElementById('nextBtn');
        const fileInfo        = document.getElementById('fileInfo');

        // Each entry: { blob, filename, objectUrl }
        let results      = [];
        let currentIndex = 0;

        // --- UI helpers ---

        function showAlert(message, type = 'error') {
            alertEl.textContent = message;
            alertEl.className = `alert show alert-${type}`;
            setTimeout(() => alertEl.classList.remove('show'), 6000);
        }

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
        }

        function showProgress(visible) {
            progressSection.classList.toggle('show', visible);
        }

        function setFormLocked(locked) {
            uploadBtn.disabled = locked;
            clearBtn.disabled  = locked;
            fileInput.disabled = locked;
        }

        // Extracts the filename from a Content-Disposition header, e.g.:
        //   attachment; filename="result.png"  →  "result.png"
        function getFilename(disposition, fallback = 'processed.png') {
            if (!disposition) return fallback;
            const match = disposition.match(/filename[^;=\n]*=(?:['"]?)([^'"\n;]*)/);
            return (match && match[1]) ? match[1].trim() : fallback;
        }

        // --- Slideshow ---

        function goToSlide(index) {
            currentIndex = index;
            const { objectUrl, filename } = results[index];

            previewImage.src     = objectUrl;
            downloadBtn.href     = objectUrl;
            downloadBtn.download = filename;

            slideCounter.textContent = `${index + 1} / ${results.length}`;
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === results.length - 1;
        }

        // Creates object URLs for all results and renders the slideshow.
        // Called once after all files have been processed.
        function showResults() {
            results.forEach(r => {
                r.objectUrl = URL.createObjectURL(r.blob);
            });

            const multi = results.length > 1;
            prevBtn.style.display        = multi ? '' : 'none';
            nextBtn.style.display        = multi ? '' : 'none';
            slideCounter.style.display   = multi ? '' : 'none';
            downloadAllBtn.style.display = multi ? '' : 'none';

            goToSlide(0);
            previewSection.classList.add('show');
        }

        // Keyboard navigation (left/right arrow keys)
        document.addEventListener('keydown', (e) => {
            if (!previewSection.classList.contains('show') || results.length <= 1) return;
            if (e.key === 'ArrowLeft'  && currentIndex > 0)               goToSlide(currentIndex - 1);
            if (e.key === 'ArrowRight' && currentIndex < results.length - 1) goToSlide(currentIndex + 1);
        });

        // Touch/swipe navigation
        let touchStartX = 0;
        previewImage.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        previewImage.addEventListener('touchend', (e) => {
            const delta = touchStartX - e.changedTouches[0].clientX;
            if (Math.abs(delta) < 50) return; // ignore small movements
            if (delta > 0 && currentIndex < results.length - 1) goToSlide(currentIndex + 1);
            if (delta < 0 && currentIndex > 0)                  goToSlide(currentIndex - 1);
        }, { passive: true });

        // --- Event handlers ---

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length === 0) return;

            if (files.length === 1) {
                const sizeMB = (files[0].size / 1024 / 1024).toFixed(2);
                fileInfo.textContent = `${files[0].name} (${sizeMB} MB)`;
            } else {
                const totalMB = (Array.from(files).reduce((sum, f) => sum + f.size, 0) / 1024 / 1024).toFixed(2);
                fileInfo.textContent = `${files.length} files selected (${totalMB} MB total)`;
            }
            fileInfo.classList.add('show');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const files = Array.from(fileInput.files);
            if (files.length === 0) {
                showAlert('Please select at least one file');
                return;
            }

            // Release object URLs from any previous run
            results.forEach(r => r.objectUrl && URL.revokeObjectURL(r.objectUrl));
            results = [];

            setFormLocked(true);
            previewSection.classList.remove('show');
            showProgress(true);

            const errors = [];

            for (let i = 0; i < files.length; i++) {
                const file = files[i];

                // Progress is split evenly across files, capped at 95% until all done
                updateProgress(
                    Math.round((i / files.length) * 95) + 5,
                    files.length > 1 ? `Processing file ${i + 1} of ${files.length}...` : 'Processing...'
                );
                statusText.textContent = file.name;

                try {
                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch('http://127.0.0.1:5000/upload', {
                        method: 'POST',
                        body: formData
                    });

                    // Error responses come back as JSON; success is a raw image blob
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error || 'Processing failed');
                    }

                    const blob     = await response.blob();
                    const fallback = file.name.replace(/\.[^.]+$/, '_processed.png');
                    const filename = getFilename(response.headers.get('Content-Disposition'), fallback);
                    results.push({ blob, filename, objectUrl: null });

                } catch (err) {
                    errors.push(`${file.name}: ${err.message}`);
                }
            }

            updateProgress(100, 'Done!');
            showProgress(false);
            statusText.textContent = '';
            setFormLocked(false);

            if (errors.length > 0) {
                const allFailed = errors.length === files.length;
                const msg = allFailed
                    ? `Processing failed: ${errors[0]}`
                    : `${errors.length} file(s) failed — ${errors.join(' | ')}`;
                showAlert(msg, allFailed ? 'error' : 'info');
            }

            if (results.length > 0) showResults();
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) goToSlide(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < results.length - 1) goToSlide(currentIndex + 1);
        });

        downloadAllBtn.addEventListener('click', async () => {
            downloadAllBtn.disabled    = true;
            downloadAllBtn.textContent = 'Zipping...';

            try {
                const zip = new JSZip();
                results.forEach(r => zip.file(r.filename, r.blob));
                const zipBlob = await zip.generateAsync({ type: 'blob' });

                // Trigger download then immediately free the temporary URL
                const url = URL.createObjectURL(zipBlob);
                Object.assign(document.createElement('a'), { href: url, download: 'processed_images.zip' }).click();
                URL.revokeObjectURL(url);
            } finally {
                downloadAllBtn.disabled    = false;
                downloadAllBtn.textContent = 'Download All';
            }
        });

        clearBtn.addEventListener('click', () => {
            fileInput.value = '';
            fileInfo.classList.remove('show');
            alertEl.classList.remove('show');
            previewSection.classList.remove('show');

            results.forEach(r => r.objectUrl && URL.revokeObjectURL(r.objectUrl));
            results = [];
            previewImage.src = '';
        });
    </script>
</body>
</html>
